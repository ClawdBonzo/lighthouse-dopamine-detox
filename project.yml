name: Lighthouse
options:
  bundleIdPrefix: com.clawdbonzo
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: 3N9RY9EG8V
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
packages:
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios.git
    from: "5.0.0"
targets:
  Lighthouse:
    type: application
    platform: iOS
    sources:
      - path: Lighthouse
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clawdbonzo.Lighthouse
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: Lighthouse/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - package: RevenueCat
        product: RevenueCat
      - target: LighthouseWidgetsExtension
  LighthouseWidgetsExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: LighthouseWidgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clawdbonzo.Lighthouse.LighthouseWidgets
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: LighthouseWidgets/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
